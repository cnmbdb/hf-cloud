<style>
  :root {
    --primary: #f08a5d;
    --primary-dark: #e67e22;
    --dark: #2d3436;
    --light: #ffffff;
    --gray: #636e72;
    --gray-light: #f8f8f8;
  }
  
  .spec-item {
    display: flex;
    flex-direction: column;
    padding: 0.4rem;
    margin-bottom: 0.4rem;
    background-color: var(--gray-light);
    border-radius: 6px;
    transition: background-color 0.2s ease;
    width: 100%;
    overflow-wrap: break-word;
    word-wrap: break-word;
    word-break: break-word;
  }
  
  .spec-item:hover {
    background-color: rgba(240, 138, 93, 0.1);
  }
  
  .spec-header {
    display: flex;
    align-items: center;
    margin-bottom: 0.2rem;
  }
  
  .spec-icon {
    margin-right: 0.3rem;
    font-size: 0.9rem;
    flex-shrink: 0;
  }
  
  .spec-label {
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--dark);
  }
  
  .spec-value {
    font-size: 0.85rem;
    color: var(--gray);
    padding-left: 1.2rem;
  }
  
  .os-value {
    font-size: 0.8rem;
    color: var(--gray);
    padding-left: 1.2rem;
    line-height: 1.4;
  }
  
  .os-name {
    display: inline-block;
    position: relative;
    margin-right: 0.5rem;
    margin-bottom: 0.2rem;
    color: var(--primary-dark);
  }
  
  .os-name:not(:last-child)::after {
    content: "•";
    position: absolute;
    right: -0.4rem;
    color: var(--gray);
    font-size: 0.7rem;
  }
  
  .highlight {
    background-color: rgba(240, 138, 93, 0.1);
    border-left: 3px solid var(--primary);
    padding-left: calc(0.4rem - 3px);
  }
  
  .highlight .spec-value {
    color: var(--primary);
    font-weight: 600;
  }
  
  .price-item {
    display: flex;
    flex-direction: column;
    padding: 0.4rem;
    margin: 0.6rem 0;
    background-color: rgba(240, 138, 93, 0.1);
    border-radius: 6px;
    border-left: 3px solid var(--primary);
    padding-left: calc(0.4rem - 3px);
  }
  
  .price-header {
    display: flex;
    align-items: center;
    margin-bottom: 0.2rem;
  }
  
  .price-label {
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--dark);
  }
  
  .price-value {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--primary);
    padding-left: 1.2rem;
  }
  
  .divider {
    height: 1px;
    background-color: var(--gray-light);
    margin: 0.6rem 0;
    width: 100%;
  }
  
  .tool-container {
    text-align: center;
    width: 100%;
  }
  
  .tool-link {
    display: inline-flex;
    align-items: center;
    padding: 0.4rem 0.6rem;
    background-color: var(--gray-light);
    border-radius: 50px;
    text-decoration: none;
    transition: background-color 0.2s ease;
    margin: 0 auto;
  }
  
  .tool-link:hover {
    background-color: rgba(240, 138, 93, 0.1);
  }
  
  .tool-icon {
    margin-right: 0.3rem;
  }
  
  .tool-text {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--dark);
  }
  
  @media (prefers-color-scheme: dark) {
    :root {
      --dark: #e0e0e0;
      --light: #1e1e1e;
      --gray: #aaaaaa;
      --gray-light: #2a2a2a;
      --primary: #d07a4d;
      --primary-dark: #c06a3d;
    }
  }
</style>
